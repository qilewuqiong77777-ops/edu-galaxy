<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>德育星系互动大模型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="galaxyCanvas" aria-label="德育星系交互模型"></canvas>

      <section class="control-panel" aria-label="德育星系控制台">
        <header class="panel-head">
          <p class="eyebrow">五年级德育工作展示</p>
          <h1>很高兴你在做更好的自己</h1>
          <button id="viewToggle" class="view-toggle" type="button">全景模式</button>
        </header>

        <section class="teacher-card">
          <div class="sun-mark"></div>
          <div>
            <p class="label">星系中心</p>
            <strong>班主任小太阳</strong>
            <span>光与热持续照亮 31 颗星球</span>
          </div>
        </section>

        <section class="light-legend" aria-label="四育教育光束图例">
          <span><i style="--legend-color:#8d6ccf"></i>智育紫光</span>
          <span><i style="--legend-color:#4f92b8"></i>体育蓝光</span>
          <span><i style="--legend-color:#d8a236"></i>美育金光</span>
          <span><i style="--legend-color:#4d9a66"></i>劳育绿光</span>
        </section>

        <section class="student-section">
          <div class="section-title">
            <span>学生星球</span>
            <small>悬浮查看五育</small>
          </div>
          <div id="studentList" class="student-list"></div>
        </section>

        <section class="class-actions">
          <div class="section-title">
            <span>九学期活动星历</span>
            <small>活动沉淀五育</small>
          </div>
          <div class="semester-tools">
            <select id="semesterSelect" aria-label="选择学期活动"></select>
            <button id="applySemester" type="button">应用本学期</button>
          </div>
          <div id="activityList" class="activity-list"></div>
          <button id="applyHistory" class="history-button" type="button">应用九学期积累</button>
          <div class="action-grid">
            <button data-virtue="de" type="button">主题班会 +德育</button>
            <button data-virtue="zhi" type="button">阅读指导 +智育</button>
            <button data-virtue="ti" type="button">运动挑战 +体育</button>
            <button data-virtue="mei" type="button">艺术表达 +美育</button>
            <button data-virtue="lao" type="button">劳动实践 +劳育</button>
          </div>
        </section>
      </section>

      <aside id="studentCard" class="student-card" aria-live="polite">
        <div class="student-card-head">
          <div>
            <p id="cardOrbit" class="label">星球 01</p>
            <h2 id="cardName">丁同学</h2>
          </div>
          <span id="cardLevel" class="level-pill">成长</span>
        </div>
        <canvas id="radarCanvas" width="230" height="190" aria-label="五育雷达图"></canvas>
        <div id="virtueBars" class="virtue-bars"></div>
        <p id="caseNote" class="case-note">很高兴你在做更好的自己。</p>
        <section class="talent-archive" aria-label="个人运动、艺术素质评价档案">
          <div class="archive-title">
            <span>个人运动、艺术素质评价档案</span>
            <small>健康第一</small>
          </div>
          <div id="talentArchive" class="archive-grid"></div>
        </section>
        <section class="communication-card" aria-label="班主任个性化沟通方式">
          <div class="archive-title">
            <span>班主任沟通方式</span>
            <small id="mbtiBadge">MBTI</small>
          </div>
          <div id="communicationGuide" class="communication-guide"></div>
        </section>
        <div id="parentMoons" class="parent-moons"></div>
      </aside>

      <div id="toast" class="toast" role="status"></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
